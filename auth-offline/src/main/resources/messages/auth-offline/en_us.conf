auth-offline {
  common {
    only-player = "<dark_gray>[<gold>Player System</gold>] <red>This command can only be used by players.</red>"
    no-permission = "<dark_gray>[<gold>Player System</gold>] <red>You do not have permission.</red>"
    denied-command = "<dark_gray>[<gold>Player System</gold>] <red>You must complete verification before using this command.</red>"
    denied-chat = "<dark_gray>[<gold>Player System</gold>] <red>You must complete verification before chatting.</red>"
    not-implemented = "<dark_gray>[<gold>Player System</gold>] <gray>This command is not implemented yet.</gray>"
    unregistered = "<dark_gray>[<gold>Player System</gold>] <red>This username has not been registered yet.</red>"
    unregistered-simple = "<red>Not registered yet.</red>"
    attached-profile-missing = "<red>No bound game profile was found, so this authentication cannot be completed.</red>"
    profile-attach-failed-after-login = "<red>Offline authentication succeeded, but attaching the profile failed.</red>"
  }

  register {
    success = "<dark_gray>[<gold>Player System</gold>] <green>Registration successful, and you have been logged in automatically.</green>"
    failed = "<dark_gray>[<gold>Player System</gold>] <red>Registration failed. Please try again later.</red>"
    password-already-set = "<dark_gray>[<gold>Player System</gold>] <yellow>You have already set an offline password. No need to do it again.</yellow>"
    usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/register [password] [confirm-password]</yellow>"
    request = "<dark_gray>[<gold>Player System</gold>] <red>Please use “/register [password] [confirm-password]” to register.</red>"
    bound-success = "<dark_gray>[<gold>Player System</gold>] <green>An existing profile was detected, and the offline password was bound automatically.</green>"
    bind-denied = "<dark_gray>[<gold>Player System</gold>] <red>An existing profile was detected, but other verification is still incomplete, so the offline password cannot be set yet.</red>"
    bind-profile-missing = "<dark_gray>[<gold>Player System</gold>] <red>No linked profile was found, so the offline password cannot be set yet.</red>"
    bind-pending = "<green>Registration succeeded, but the current name cannot be assigned a profile directly. To continue creating a new profile, use /rename [new-registration-name]; to bind to an existing profile, use /bindcode use [binding-code].</green>"
    bind-pending-error = "<red>Registration succeeded, but an error occurred while waiting for binding.</red>"
  }

  login {
    usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/login [password] [code]</yellow> <gray>or</gray> <yellow>/login as [username] [password] [code]</yellow>"
    request = "<dark_gray>[<gold>Player System</gold>] <red>Please use “/login [password]” to log in.</red>"
    success = "<dark_gray>[<gold>Player System</gold>] <green>Login successful!</green>"
    already-logged-in = "<dark_gray>[<gold>Player System</gold>] <red>You are already logged in.</red>"
    not-logged-in = "<dark_gray>[<gold>Player System</gold>] <red>You are not logged in yet.</red>"
    wrong-password = "<dark_gray>[<gold>Player System</gold>] <red>Wrong password.</red>"
    blocked = "<dark_gray>[<gold>Player System</gold>] <red>Too many failed login attempts. Please try again in <duration>.</red>"
    wrong-password-with-remaining-attempts = "<dark_gray>[<gold>Player System</gold>] <red>Wrong password. You have <remaining_attempts> attempts remaining.</red>"
    account-not-found = "<dark_gray>[<gold>Player System</gold>] <red>The offline account “<username>” has not been registered.</red>"
    current-name-not-registered = "<dark_gray>[<gold>Player System</gold>] <red>Your current connection name “<current_name>” is not registered. If you want to log into another offline account, use /login as [username] [password] [code].</red>"
  }

  password {
    mismatch = "<dark_gray>[<gold>Player System</gold>] <red>The two passwords do not match.</red>"
    changed = "<dark_gray>[<gold>Player System</gold>] <green>Password changed successfully!</green>"
    changed-auto-authed = "<dark_gray>[<gold>Player System</gold>] <green>Password changed successfully!</green> <gray>This authentication has been completed automatically.</gray>"
    update-failed = "<red>Failed to update the password. Please try again later.</red>"
    reset-failed = "<red>Failed to reset the password. Please try again later.</red>"
    change-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/changepassword [old-password] [new-password]</yellow>"
    old-wrong = "<dark_gray>[<gold>Player System</gold>] <red>The old password is incorrect.</red>"
    wrong = "<dark_gray>[<gold>Player System</gold>] <red>Password is incorrect.</red>"
    unsafe = "<dark_gray>[<gold>Player System</gold>] <red>Password length must be between <min> and <max> characters.</red>"
    contains-name = "<dark_gray>[<gold>Player System</gold>] <red>You cannot use a password containing the username “<name>”.</red>"
  }

  logout {
    usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/logout</yellow>"
    success = "<dark_gray>[<gold>Player System</gold>] <green>You have logged out successfully. Please log in again.</green>"
  }

  unregister {
    usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/unregister [password]</yellow>"
    success = "<dark_gray>[<gold>Player System</gold>] <green>Account unregistered.</green>"
    failed = "<red>Failed to unregister the account. Please try again later.</red>"
  }

  session {
    auto-login = "<dark_gray>[<gold>Player System</gold>] <green>Welcome back! You have been logged in automatically using a valid session.</green>"
    invalid = "<dark_gray>[<gold>Player System</gold>] <yellow>An old session was found to be invalid. Please enter your password again.</yellow>"
  }

  email {
    usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/email [add|change|show|recovery|code|setpassword] ...</yellow>"
    disabled = "<dark_gray>[<gold>Player System</gold>] <red>Email functionality is not enabled on this server.</red>"
    invalid = "<dark_gray>[<gold>Player System</gold>] <red>Invalid email address.</red>"
    added = "<dark_gray>[<gold>Player System</gold>] <green>Email bound successfully.</green>"
    changed = "<dark_gray>[<gold>Player System</gold>] <green>Email updated successfully.</green>"
    already-used = "<dark_gray>[<gold>Player System</gold>] <red>This email is already used by another account.</red>"
    not-set = "<dark_gray>[<gold>Player System</gold>] <yellow>This account does not have an email bound yet.</yellow>"
    add-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/email add [current-password] [email] [confirm-email]</yellow>"
    change-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/email change [current-password] [old-email] [new-email]</yellow>"
    show-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/email show [current-password]</yellow>"
    recovery-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/email recovery [email]</yellow>"
    code-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/email code [verification-code]</yellow>"
    setpassword-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/email setpassword [new-password] [confirm-password]</yellow>"
    mismatch = "<red>The two email addresses do not match.</red>"
    bind-failed = "<red>Failed to bind the email. Please try again later.</red>"
    old-mismatch = "<red>The old email does not match.</red>"
    change-failed = "<red>Failed to update the email. Please try again later.</red>"
    show = "<dark_gray>[<gold>Player System</gold>] <green>Current bound email:</green> <white><email></white>"
    recovery-hint = "<dark_gray>[<gold>Player System</gold>] <yellow>Forgot your password? Use /email recovery [email] to request recovery.</yellow>"
    recovery-email-sent = "<dark_gray>[<gold>Player System</gold>] <green>A recovery email has been sent. Please check your inbox.</green>"
    recovery-email-sent-with-diagnostic = "<dark_gray>[<gold>Player System</gold>] <green>A recovery email has been sent. Please check your inbox.</green> <gray>(<diagnostic>)</gray>"
    recovery-code-correct = "<dark_gray>[<gold>Player System</gold>] <green>The verification code is correct. Please use /email setpassword [new-password] [confirm-password] immediately.</green>"
    recovery-code-incorrect = "<dark_gray>[<gold>Player System</gold>] <red>The verification code is incorrect.</red>"
    recovery-code-expired = "<dark_gray>[<gold>Player System</gold>] <red>The verification code has expired. Please use /email recovery [email] again.</red>"
    recovery-code-not-requested = "<dark_gray>[<gold>Player System</gold>] <red>You have not requested a recovery code yet.</red>"
    recovery-password-window-expired = "<dark_gray>[<gold>Player System</gold>] <red>You can no longer change the password using the recovery code. Please request recovery again.</red>"
    recovery-code-write-failed = "<red>Failed to store the recovery code. Please try again later.</red>"
    recovery-state-update-failed = "<red>Failed to update the recovery-code state. Please try again later.</red>"
    recovery-cooldown = "<dark_gray>[<gold>Player System</gold>] <red>A recovery email was sent recently. Please try again in <duration>.</red>"
    recovery-code-attempts-exceeded = "<dark_gray>[<gold>Player System</gold>] <red>You have reached the maximum number of incorrect recovery-code attempts. Please use /email recovery [email] again to get a new code.</red>"
    recovery-send-failure = "<dark_gray>[<gold>Player System</gold>] <red>Failed to send the recovery email. Please ask an administrator to check the mail configuration.</red>"
    recovery-send-failure-with-reason = "<dark_gray>[<gold>Player System</gold>] <red>Failed to send the recovery email: <reason></red>"
    invalid-recovery-delivery-mode = "<dark_gray>[<gold>Player System</gold>] <yellow>The current recovery delivery mode is <mode>, so the verification code has been written to the server log.</yellow>"
  }

  totp {
    usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/totp [add|confirm|remove] ...</yellow>"
    add-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/totp add [password]</yellow>"
    confirm-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/totp confirm [code]</yellow>"
    remove-usage = "<dark_gray>[<gold>Player System</gold>] <yellow>/totp remove [password] [code]</yellow>"
    disabled-by-config = "<dark_gray>[<gold>Player System</gold>] <red>TOTP two-factor authentication is not enabled on this server.</red>"
    already-enabled = "<dark_gray>[<gold>Player System</gold>] <yellow>TOTP two-factor authentication is already enabled for this account.</yellow>"
    not-enabled = "<dark_gray>[<gold>Player System</gold>] <yellow>TOTP two-factor authentication is not enabled for this account yet.</yellow>"
    pending-not-found = "<dark_gray>[<gold>Player System</gold>] <yellow>No pending TOTP setup was found. Please use /totp add [password] first.</yellow>"
    invalid-code = "<dark_gray>[<gold>Player System</gold>] <red>The TOTP code is incorrect or has already been used.</red>"
    enabled = "<dark_gray>[<gold>Player System</gold>] <green>TOTP two-factor authentication has been enabled successfully.</green>"
    disabled = "<dark_gray>[<gold>Player System</gold>] <green>TOTP two-factor authentication has been disabled successfully.</green>"
    enable-failed = "<red>Failed to enable two-factor authentication. Please try again later.</red>"
    disable-failed = "<red>Failed to disable two-factor authentication. Please try again later.</red>"
    login-required = "<dark_gray>[<gold>Player System</gold>] <yellow>This account has TOTP enabled. Please use /login [password] [code]; to specify an account, use /login as [username] [password] [code].</yellow>"
    login-hint = "<dark_gray>[<gold>Player System</gold>] <gray>TOTP is enabled. Please use /login [password] [code] to log in; to specify an account, use /login as [username] [password] [code].</gray>"
    setup-generated = "<dark_gray>[<gold>Player System</gold>] <green>A TOTP secret has been generated.</green><newline/><gray>Secret: </gray><white><secret></white><newline/><gray>OTPAuth: </gray><white><otp_auth_url></white><newline/><yellow>Add it to your authenticator app, then use /totp confirm [code] to finish enabling it.</yellow>"
  }

  prompt {
    pending-bind = "<dark_gray>[<gold>Player System</gold>] <gray>Your offline registration data has been saved temporarily. If the name is conflicting, use /rename [new-registration-name] to retry profile creation; if you want to bind an existing profile, use /bindcode use [binding-code].</gray>"
    login-other-username = "<dark_gray>[<gold>Player System</gold>] <gray>If your current connection name is not your offline account name, use /login as [username] [password] [code].</gray>"
    change-password = "<dark_gray>[<gold>Player System</gold>] <gray>To change your password: /changepassword [old-password] [new-password]</gray>"
    email-add = "<dark_gray>[<gold>Player System</gold>] <gray>You can use /email add [current-password] [email] [confirm-email] to bind an email.</gray>"
    totp-remove = "<dark_gray>[<gold>Player System</gold>] <gray>TOTP is enabled. You can use /totp remove [password] [code] to disable it.</gray>"
    totp-add = "<dark_gray>[<gold>Player System</gold>] <gray>You can use /totp add [password] to enable two-factor authentication.</gray>"
  }
}

